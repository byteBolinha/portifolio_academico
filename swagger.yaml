openapi: 3.0.3
info:
  title: API de Gestão Acadêmica - Unifacisa
  description: API para gerenciamento de documentos acadêmicos, competências, cursos e usuários com integração Microsoft SSO.
  version: 1.0.0

servers:
  - url: http://localhost:3000
    description: Servidor de Desenvolvimento

components:
  securitySchemes:
    MicrosoftAuth:
      type: apiKey
      in: header
      name: Authorization
      description: "Token da Microsoft Graph (Ex: Bearer {token_da_microsoft})"
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "JWT retornado pela rota /auth/login após validação"

  schemas:
    User:
      type: object
      properties:
        id: { type: integer, example: 1 }
        name: { type: string }
        email: { type: string, format: email }
        role: { type: string, example: "ADMIN" }

    LoginResponse:
      type: object
      properties:
        token: { type: string }
        user:
          $ref: '#/components/schemas/User'

    Course:
      type: object
      properties:
        id_courses: { type: integer }
        name_courses: { type: string }
        matrix_courses: { type: string }
        course_icon_url: { type: string }
        active: { type: integer }

    Competency:
      type: object
      properties:
        id_competency: { type: integer }
        name_competency: { type: string }
        course_id: { type: integer }
        code_competency: { type: string }
        matriz_competency: { type: string }

    AcademicDocument:
      type: object
      properties:
        id_academicD: { type: integer }
        name_academicD: { type: string }
        competency_id: { type: integer }
        id_documentType: { type: integer }
        matriz_competency: { type: string }
        trimestre: { type: string }
        drive_link: { type: string }
        flag_liberado_customizar: { type: integer }
        flag_preenchido: { type: integer }
        flag_validacao_coordenacao: { type: integer }
        flag_integrado_rm: { type: integer }
        flag_disponivel_canva: { type: integer }
        flag_necessita_revisao: { type: integer }
        flag_em_preenchimento: { type: integer }

    Notification:
      type: object
      properties:
        id_notification: { type: integer }
        user_id: { type: integer }
        competency_id: { type: integer }
        document_id: { type: integer }
        title: { type: string }
        message: { type: string }
        is_read: { type: integer }
        created_at: { type: string, format: date-time }

paths:
  # AUTH
  /auth/login:
    post:
      tags: [Auth]
      summary: Realiza login via Microsoft SSO
      security:
        - MicrosoftAuth: []
      responses:
        '200':
          description: Sucesso. Retorna o JWT e dados do usuário.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'

  # COURSES
  /courses:
    get:
      tags: [Courses]
      summary: Lista todos os cursos
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: Lista de cursos
    post:
      tags: [Courses]
      summary: Cria um novo curso (Form-data para imagem)
      security: [{ BearerAuth: [] }]
      responses:
        '201':
          description: Curso criado

  /courses/{id}:
    put:
      tags: [Courses]
      summary: Atualiza um curso
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Curso atualizado
    delete:
      tags: [Courses]
      summary: Exclui um curso
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Curso excluído

  /courses/{id}/enroll:
    post:
      tags: [Courses]
      summary: Vincula usuário ao curso
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                user_id: { type: integer }
      responses:
        '201':
          description: Vinculado com sucesso

  # COMPETENCIES & DOCUMENTS
  /academic-documents:
    post:
      tags: [Academic Documents]
      summary: Cria competência com Planner e Plano de Ensino
      security: [{ BearerAuth: [] }]
      responses:
        '201':
          description: Criado com sucesso

  /academic-documents/competency/{competency_id}:
    get:
      tags: [Academic Documents]
      summary: Lista documentos por competência
      security: [{ BearerAuth: [] }]
      parameters:
        - name: competency_id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Lista de documentos

  /academic-documents/{id}/flag/{type}:
    patch:
      tags: [Academic Documents]
      summary: Atualiza flags de status (customizar, preenchido, coordenacao, gestao, necessita-revisao, em-preenchimento, canvas)
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
        - name: type
          in: path
          required: true
          schema:
            type: string
            enum: [customizar, preenchido, coordenacao, gestao, necessita-revisao, em-preenchimento, canvas]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                status: { type: integer }
      responses:
        '200':
          description: Status atualizado

  /academic-documents/{id}/drive-link:
    patch:
      tags: [Academic Documents]
      summary: Atualiza link do drive
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                link: { type: string }
      responses:
        '200':
          description: Link atualizado

  # NOTIFICATIONS
  /notifications:
    get:
      tags: [Notifications]
      summary: Lista todas as notificações
      responses:
        '200':
          description: Lista de notificações

  /notifications/course/{id}:
    get:
      tags: [Notifications]
      summary: Lista notificações por curso
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Lista filtrada

  # SEARCH
  /search:
    get:
      tags: [Search]
      summary: Busca global (cursos e competências)
      parameters:
        - name: search
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Resultados da busca

  # USERS
  /users:
    get:
      tags: [Users]
      summary: Lista todos os usuários
      security: [{ BearerAuth: [] }]
    patch:
      tags: [Users]
      summary: Altera role de usuário (Caminho /users/users/{id}/role no código atual)
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                role_id: { type: integer }
