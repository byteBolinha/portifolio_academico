openapi: 3.0.3
info:
  title: API de Gestão Acadêmica - Unifacisa
  description: API para gerenciamento de documentos acadêmicos, competências, cursos e usuários com integração Microsoft SSO.
  version: 1.0.0

servers:
  - url: http://localhost:3000
    description: Servidor de Desenvolvimento

# Configuração de Segurança
components:
  securitySchemes:
    MicrosoftAuth:
      type: apiKey
      in: header
      name: Authorization
      description: "Token da Microsoft Graph (Ex: Bearer {token_da_microsoft})"
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "JWT retornado pela rota /login após validação"

  schemas:
    # --- MODELS BASEADOS NOS SEUS ARQUIVOS .MODEL.JS ---
    User:
      type: object
      properties:
        id_users: { type: integer, example: 1 }
        microsoft_id: { type: string }
        email_users: { type: string, format: email }
        name_users: { type: string }
        roles_id: { type: integer }
        active: { type: integer, example: 1 }

    AcademicDocument:
      type: object
      properties:
        id_academicD: { type: integer }
        name_academicD: { type: string }
        competency_id: { type: integer }
        id_documentType: { type: integer }
        matriz: { type: string }
        trimestre: { type: integer }
        drive_link: { type: string }
        flag_liberado_customizar: { type: integer }
        flag_preenchido: { type: integer }
        flag_validacao_coordenacao: { type: integer }
        flag_integrado_rm: { type: integer }
        flag_disponivel_canva: { type: integer }

    Course:
      type: object
      properties:
        id_courses: { type: integer }
        name_courses: { type: string }
        launch_date_courses: { type: string, format: date }
        course_icon_url: { type: string }
        active: { type: integer }

    Competency:
      type: object
      properties:
        id_competency: { type: integer }
        name_competency: { type: string }
        course_id: { type: integer }
        code_competency: { type: string }

# --- DEFINIÇÃO DAS ROTAS ---
paths:
  # AUTENTICAÇÃO
  /login:
    post:
      tags: [Auth]
      summary: Realiza login via Microsoft SSO
      security:
        - MicrosoftAuth: []
      responses:
        '200':
          description: Sucesso. Retorna o JWT interno do sistema.
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
        '401':
          description: Token Microsoft inválido ou não fornecido.

  # DOCUMENTOS ACADÊMICOS
  /academic-documents:
    post:
      tags: [Academic Documents]
      summary: Cria um novo documento acadêmico
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                competency_id: { type: integer }
                documentType_id: { type: integer }
                matriz: { type: string }
                trimestre: { type: integer }
      responses:
        '201':
          description: Documento criado.

  /academic-documents/{id}:
    get:
      tags: [Academic Documents]
      summary: Busca documento por ID
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
    delete:
      tags: [Academic Documents]
      summary: Remove um documento
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }

  # FLAGS E LINKS (PATCHES)
  /academic-documents/{id}/flag/customizar:
    patch:
      tags: [Academic Documents]
      security: [{ BearerAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      requestBody:
        content:
          application/json:
            schema: { type: object, properties: { status: { type: integer } } }

  /academic-documents/{id}/drive-link:
    patch:
      tags: [Academic Documents]
      security: [{ BearerAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      requestBody:
        content:
          application/json:
            schema: { type: object, properties: { link: { type: string } } }

  # CURSOS
  /courses:
    get:
      tags: [Courses]
      summary: Lista todos os cursos
      security: [{ BearerAuth: [] }]
    post:
      tags: [Courses]
      summary: Cria um novo curso
      security: [{ BearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                created_at: { type: string, format: date }
                course_icon: { type: string }

  # USUÁRIOS
  /users:
    get:
      tags: [Users]
      summary: Lista todos os usuários
      security: [{ BearerAuth: [] }]
  
  /users/{id}/role:
    patch:
      tags: [Users]
      summary: Altera a role de um usuário
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                role_id: { type: integer }