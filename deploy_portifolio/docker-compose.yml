services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
      MYSQL_DATABASE: ${DB_NAME}
    volumes:
      - ../portifolio_academico/src/database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:z
      - ../portifolio_academico/src/database/feeding.sql:/docker-entrypoint-initdb.d/02_feeding.sql:z
      - ../portifolio_academico/src/database/coursesFeeding.sql:/docker-entrypoint-initdb.d/03_coursesFeeding.sql:z
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ../portifolio_academico
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES: ${JWT_EXPIRES}
      CLIENT_ID: ${CLIENT_ID}
      TENANT_ID: ${TENANT_ID}
      CLIENT_SECRET: ${CLIENT_SECRET}
      CORS_ORIGIN: http://localhost:5173
    ports:
      - "3000:3000"
    volumes:
      - ../portifolio_academico/uploads:/app/uploads:z
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ../portfolio-frontend/portfolio
      args:
        VITE_API_URL: http://localhost:3000
    ports:
      - "5173:80"
    depends_on:
      - backend
