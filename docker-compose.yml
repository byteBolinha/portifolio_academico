services:
  db:
    image: mysql:8.0
    container_name: portfolio-db
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
    ports:
      - "3306:3306"
    volumes:
      - ../portifolio_academico/src/database/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
      - ../portifolio_academico/src/database/feeding.sql:/docker-entrypoint-initdb.d/2-feeding.sql
      - ../portifolio_academico/src/database/coursesFeeding.sql:/docker-entrypoint-initdb.d/3-coursesFeeding.sql
      - db_data:/var/lib/mysql

  backend:
    build: ../portifolio_academico
    container_name: portfolio-backend
    restart: always
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME}
      CORS_ORIGIN: "*" 
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES: 2h
    volumes:
      - ../portifolio_academico/uploads:/app/uploads
    depends_on:
      - db

  frontend:
    build:
      context: ../portfolio-frontend/portfolio
      args:
        VITE_API_URL: "" 
    container_name: portfolio-frontend
    restart: always
    depends_on:
      - backend

  gateway:
    image: nginx:alpine
    container_name: portfolio-gateway
    volumes:
      - ./nginx-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

  cloudflare-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: cloudflare-tunnel
    restart: unless-stopped
    command: tunnel --url http://gateway:80
    depends_on:
      - gateway

volumes:
  db_data:
